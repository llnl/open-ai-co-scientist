name: Hugging Face Deploy

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy"
        required: true
        default: "main"
      dry_run:
        description: "Run checks without pushing to Hugging Face"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

concurrency:
  group: huggingface-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        startsWith(github.ref, 'refs/tags/v') ||
        (
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main' &&
          contains(github.event.head_commit.message, 'from llnl/sync/v')
        )
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          pip install torch==2.12.1 --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint and offline tests
        run: |
          make lint
          make test

      - name: Boot smoke
        run: |
          python - <<'EOF'
          import importlib.util
          from unittest.mock import patch
          spec = importlib.util.spec_from_file_location("gradio_app", "app.py")
          m = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(m)
          with patch.object(m.requests, "get", side_effect=RuntimeError("offline deploy smoke")):
              demo = m.create_gradio_interface()
          assert demo is not None
          print("Gradio interface constructs OK")
          EOF

      - name: Hugging Face dependency preflight
        run: |
          python -m venv /tmp/hf-preflight
          /tmp/hf-preflight/bin/python -m pip install --upgrade pip
          GRADIO_VERSION="$(python - <<'EOF'
          from pathlib import Path
          for line in Path("requirements.txt").read_text(encoding="utf-8").splitlines():
              if line.startswith("gradio=="):
                  print(line.split("==", 1)[1].split()[0])
                  break
          else:
              raise SystemExit("requirements.txt must pin gradio==...")
          EOF
          )"
          /tmp/hf-preflight/bin/pip install --dry-run \
            -r requirements.txt \
            "gradio[oauth,mcp]==${GRADIO_VERSION}" \
            "uvicorn>=0.14.0" "websockets>=10.4" \
            spaces

      - name: Deploy to Hugging Face Space
        if: ${{ github.event_name == 'push' || github.event.inputs.dry_run == 'false' }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: ${{ vars.HF_SPACE_ID }}
        run: |
          test -n "$HF_TOKEN"
          test -n "$HF_SPACE_ID"
          git clone "https://oauth2:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_ID}" /tmp/hf-space
          rsync -a --delete \
            --exclude .git \
            --exclude .github \
            --exclude .pytest_cache \
            --exclude .ruff_cache \
            --exclude .worktree \
            --exclude .audit \
            --exclude .env \
            --exclude results \
            --exclude venv \
            ./ /tmp/hf-space/
          cd /tmp/hf-space
          git config user.name "co-scientist-deploy"
          git config user.email "co-scientist-deploy@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to deploy."
          else
            git commit -m "Deploy ${GITHUB_SHA}"
            git push
          fi

      - name: Watch Hugging Face deployment status
        if: ${{ github.event_name == 'push' || github.event.inputs.dry_run == 'false' }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: ${{ vars.HF_SPACE_ID }}
        run: |
          test -n "$HF_TOKEN"
          test -n "$HF_SPACE_ID"
          python scripts/watch_huggingface_space.py --timeout-seconds 900 --poll-seconds 15
